<style>
    .top-title {
        padding: 0;
        margin: 0;
        line-height: 1;
    }

    .top-title-svg {
        width: min(94vw, 780px);
        height: auto;
        display: block;
    }

    .title-char-prestroke {
        fill: transparent;
        stroke: var(--color-text-0);
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
        opacity: 0;

        stroke-dasharray: var(--dash, 300);
        stroke-dashoffset: var(--dash, 300);

        animation: char-prewrite 0.3s cubic-bezier(.25, .8, .25, 1) forwards;
        animation-delay: calc(var(--i) * 40ms);
    }

    .title-char-stroke {
        fill: transparent;
        stroke: var(--color-text-1);
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;

        stroke-dasharray: var(--dash, 300);
        stroke-dashoffset: var(--dash, 300);

        animation: char-write 1s cubic-bezier(.25, .8, .25, 1) forwards;
        animation-delay: calc(var(--i) * 40ms + 400ms);
    }

    .title-char-fill {
        fill: var(--color-text-1);
        opacity: 0;

        animation: char-fill .6s cubic-bezier(.22, 1, .36, 1) forwards;
        animation-delay: calc(var(--i) * 40ms + 600ms);
    }

    .top {
        display: flex;
        flex-direction: column;
    }

    .center {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .zero-padding {
        padding: 0;
    }

    @keyframes char-prewrite {
        0% {
            opacity: 0;
            stroke-dashoffset: var(--dash, 300);
        }

        18% {
            opacity: .38;
        }

        72% {
            opacity: .28;
        }

        100% {
            opacity: 0;
            stroke-dashoffset: 0;
        }
    }

    @keyframes char-write {
        from {
            stroke-dashoffset: var(--dash, 300);
        }

        to {
            stroke-dashoffset: 0;
        }
    }

    @keyframes char-fill {
        0% {
            opacity: 0;
            filter: blur(3px);
        }

        65% {
            opacity: .9;
            filter: blur(.5px);
        }

        100% {
            opacity: 1;
            filter: blur(0);
        }
    }

    @media (max-width: 600px) {
        .top-title-svg {
            width: min(94vw, 520px);
        }
    }

    @media (prefers-reduced-motion: reduce) {
        .title-char-prestroke,
        .title-char-stroke,
        .title-char-fill,

        .title-char-prestroke {
            opacity: 0;
        }

        .title-char-stroke {
            stroke-dashoffset: 0;
        }

        .title-char-fill {
            opacity: 1;
            filter: none;
        }
    }
</style>
